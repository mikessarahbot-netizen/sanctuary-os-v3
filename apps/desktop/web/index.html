<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sanctuary OS — Presenter</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: #101820;
        color: #f7f7f2;
      }
      main {
        text-align: center;
        padding: 2rem;
        width: min(420px, 90vw);
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.25rem;
      }
      p.subtitle {
        margin: 0 0 1.5rem;
        opacity: 0.7;
        font-size: 0.95rem;
      }
      .status-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
      }
      .status-card {
        background: #1b2733;
        border-radius: 0.75rem;
        padding: 1rem;
      }
      .status-card .value {
        font-size: 1.75rem;
        font-weight: 600;
      }
      .status-card .label {
        font-size: 0.8rem;
        opacity: 0.7;
        margin-top: 0.25rem;
      }
      .status-card.attention .value {
        color: #ffb74d;
      }
      #connection {
        margin-top: 1rem;
        font-size: 0.8rem;
        opacity: 0.6;
      }
      .actions {
        margin-top: 1.5rem;
        display: grid;
        gap: 0.5rem;
      }
      .actions input {
        padding: 0.5rem 0.75rem;
        border-radius: 0.5rem;
        border: 1px solid #2b3a48;
        background: #0c141b;
        color: #f7f7f2;
      }
      .actions .buttons {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
      }
      .actions button {
        flex: 1;
        padding: 0.5rem;
        border-radius: 0.5rem;
        border: 0;
        cursor: pointer;
        font-weight: 600;
        background: #2b3a48;
        color: #f7f7f2;
      }
      #action-result {
        font-size: 0.8rem;
        opacity: 0.7;
        min-height: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sanctuary OS — Presenter</h1>
      <p class="subtitle">Local sync queue status</p>
      <div class="status-grid">
        <div class="status-card"><div class="value" id="total">—</div><div class="label">Total</div></div>
        <div class="status-card"><div class="value" id="pending">—</div><div class="label">Pending</div></div>
        <div class="status-card"><div class="value" id="synced">—</div><div class="label">Synced</div></div>
        <div class="status-card attention"><div class="value" id="needsAttention">—</div><div class="label">Needs attention</div></div>
      </div>
      <div id="connection">Connecting to the replay sidecar…</div>
      <div class="actions">
        <input id="entry-id" type="text" placeholder="Queue entry id" aria-label="Queue entry id" />
        <div class="buttons">
          <button id="requeue-btn" type="button">Requeue</button>
          <button id="cancel-btn" type="button">Cancel</button>
        </div>
        <div id="action-result"></div>
      </div>
    </main>
    <script>
      const STATUS_PORT = "7421";
      const STATUS_URL = `http://127.0.0.1:${STATUS_PORT}/status`;
      const fields = ["total", "pending", "synced", "needsAttention"];

      const render = (summary) => {
        for (const field of fields) {
          document.getElementById(field).textContent = String(summary[field] ?? 0);
        }
      };

      const poll = async () => {
        const connection = document.getElementById("connection");
        try {
          const response = await fetch(STATUS_URL, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const data = await response.json();
          render(data.summary);
          connection.textContent = "Connected to the replay sidecar.";
        } catch {
          connection.textContent = "Replay sidecar is offline.";
        }
      };

      const ACTION_URL = `http://127.0.0.1:${STATUS_PORT}/actions`;

      const postAction = async (action) => {
        const queueEntryId = document.getElementById("entry-id").value.trim();
        const result = document.getElementById("action-result");
        if (queueEntryId === "") {
          result.textContent = "Enter a queue entry id.";
          return;
        }
        try {
          const response = await fetch(ACTION_URL, {
            body: JSON.stringify({ action, queueEntryId }),
            headers: { "content-type": "application/json" },
            method: "POST"
          });
          result.textContent = response.ok
            ? `${action} applied to ${queueEntryId}.`
            : `Could not ${action} ${queueEntryId} (HTTP ${response.status}).`;
          poll();
        } catch {
          result.textContent = "Replay sidecar is offline.";
        }
      };

      document.getElementById("requeue-btn").addEventListener("click", () => postAction("requeue"));
      document.getElementById("cancel-btn").addEventListener("click", () => postAction("cancel"));

      poll();
      setInterval(poll, 5000);
    </script>
  </body>
</html>
